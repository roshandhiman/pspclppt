<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSPCL Training: Distribution Maintenance & Pole Climbing</title>
    <style>
        :root {
            --pspcl-blue: #003366;
            --pspcl-yellow: #FFCC00;
            --pspcl-light-blue: #00509E;
            --text-dark: #333333;
            --text-light: #ffffff;
            --bg-gray: #f4f7f6;
            --danger: #d32f2f;
            --success: #388e3c;
            --warning-bg: #fff3e0;
            --note-bg: #e8eaf6;
            --border-radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden; /* Prevent scrolling, slide based */
            display: flex;
            flex-direction: column;
        }

        /* --- Header / Nav --- */
        header {
            background-color: var(--pspcl-blue);
            color: var(--text-light);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .brand-circle {
            width: 40px;
            height: 40px;
            background-color: var(--pspcl-yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--pspcl-blue);
            font-weight: 900;
        }

        .controls-top {
            display: flex;
            gap: 10px;
        }

        button {
            cursor: pointer;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-nav {
            background-color: var(--pspcl-yellow);
            color: var(--pspcl-blue);
        }

        .btn-nav:hover {
            background-color: #e6b800;
        }

        .btn-toggle-notes {
            background-color: rgba(255,255,255,0.2);
            color: white;
        }

        .btn-toggle-notes:hover {
            background-color: rgba(255,255,255,0.3);
        }

        /* --- Main Presentation Area --- */
        main {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .slide-container {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: none; /* Hidden by default */
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.4s ease-in-out;
        }

        .slide.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Slide Layout Structure --- */
        .slide-header {
            background-color: var(--pspcl-blue);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slide-header h2 {
            font-size: 1.4rem;
        }

        .slide-number {
            background: var(--pspcl-yellow);
            color: var(--pspcl-blue);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .slide-body {
            flex: 1;
            padding: 25px;
            display: flex;
            gap: 20px;
            overflow-y: auto; /* Allow scrolling if content is long */
        }

        .content-col {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .visual-col {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- Content Elements --- */
        h3 {
            color: var(--pspcl-light-blue);
            margin-bottom: 5px;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--pspcl-yellow);
            display: inline-block;
            padding-bottom: 2px;
        }

        p, li {
            font-size: 1rem;
            line-height: 1.5;
            color: #444;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 8px;
        }

        .highlight-box {
            background-color: var(--note-bg);
            border-left: 5px solid var(--pspcl-light-blue);
            padding: 15px;
            border-radius: 4px;
        }

        .warning-box {
            background-color: #ffebee;
            border-left: 5px solid var(--danger);
            padding: 15px;
            border-radius: 4px;
            color: #b71c1c;
        }

        .safety-box {
            background-color: #e8f5e9;
            border: 2px solid var(--success);
            padding: 15px;
            border-radius: 4px;
            color: #1b5e20;
        }

        .diagram-placeholder {
            background-color: #eee;
            border: 2px dashed #ccc;
            border-radius: 8px;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #777;
            text-align: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .diagram-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        /* --- Trainer Notes Section --- */
        .trainer-notes {
            background-color: #263238;
            color: #eceff1;
            padding: 15px 25px;
            border-top: 4px solid var(--pspcl-yellow);
            font-size: 0.95rem;
            display: none; /* Hidden by default */
        }

        .trainer-notes.show {
            display: block;
        }

        .trainer-notes strong {
            color: var(--pspcl-yellow);
        }

        .note-label {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
            color: #90a4ae;
            font-size: 0.8rem;
        }

        /* --- CSS Diagrams (Technical Infographics) --- */
        .flow-chart {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .flow-step {
            background: white;
            border: 2px solid var(--pspcl-blue);
            color: var(--pspcl-blue);
            padding: 10px;
            border-radius: 20px;
            font-weight: bold;
            position: relative;
            width: 80%;
            text-align: center;
        }
        .arrow-down {
            width: 0; 
            height: 0; 
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid var(--pspcl-blue);
        }

        /* --- Table Styling --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            font-size: 0.9rem;
        }
        th {
            background-color: var(--pspcl-blue);
            color: white;
        }

        /* --- Footer Controls --- */
        .footer-controls {
            height: 50px;
            background: #fff;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: var(--pspcl-yellow);
            width: 0%;
            transition: width 0.3s;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .slide-body {
                flex-direction: column;
            }
            .visual-col {
                display: none; /* Hide visuals on mobile to save space */
            }
            .brand span {
                display: none;
            }
        }
    </style>
</head>

        // --- RENDER LOGIC ---
        const container = document.getElementById('slideContainer');
        const progressBar = document.getElementById('progressBar');
        const indicator = document.getElementById('slideIndicator');
        let currentSlide = 0;

        function init() {
            slidesData.forEach((slide, index) => {
                const slideEl = document.createElement('article');
                slideEl.className = `slide ${index === 0 ? 'active' : ''}`;
                slideEl.id = `slide-${index}`;
                
                // Determine layout based on data
                let visualHTML = slide.visual ? `<div class="visual-col">${slide.visual}</div>` : '';
                
                slideEl.innerHTML = `
                    <div class="slide-header">
                        <h2>${slide.title}</h2>
                        <span class="slide-number">${index + 1}</span>
                    </div>
                    <div class="slide-body">
                        <div class="content-col">
                            ${slide.content}
                        </div>
                        ${visualHTML}
                    </div>
                    <div class="trainer-notes">
                        <span class="note-label">TRAINER SPEAKING NOTES (Punjabi + English):</span>
                        <p>${slide.trainer}</p>
                    </div>
                `;
                container.appendChild(slideEl);
            });
            updateProgress();
        }

        function showSlide(index) {
            const slides = document.querySelectorAll('.slide');
            if (index >= slides.length) currentSlide = 0;
            else if (index < 0) currentSlide = slides.length - 1;
            else currentSlide = index;

            slides.forEach((slide, i) => {
                slide.classList.remove('active');
                if (i === currentSlide) slide.classList.add('active');
            });
            updateProgress();
        }

        function nextSlide() {
            showSlide(currentSlide + 1);
        }

        function prevSlide() {
            showSlide(currentSlide - 1);
        }

        function updateProgress() {
            const percent = ((currentSlide + 1) / slidesData.length) * 100;
            progressBar.style.width = `${percent}%`;
            indicator.innerText = `${currentSlide + 1} / ${slidesData.length}`;
        }

        function toggleNotes() {
            const notes = document.querySelectorAll('.trainer-notes');
            const btn = document.querySelector('.btn-toggle-notes');
            notes.forEach(note => {
                if (note.classList.contains('show')) {
                    note.classList.remove('show');
                    btn.innerText = "👁 Show Trainer Notes";
                } else {
                    note.classList.add('show');
                    btn.innerText = "🚫 Hide Trainer Notes";
                }
            });
        }

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 't' || e.key === 'T') toggleNotes();
        });

        // Initialize
        init();

    </script>
